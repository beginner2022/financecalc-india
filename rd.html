<!DOCTYPE html>
<html>
<head>
  <title>RD Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Recurring Deposit Calculator</h1>
</header>

<div class="container">

  <input id="monthly" placeholder="Monthly Deposit">
  <br>
  <input id="rate" placeholder="Interest Rate %">
  <br>
  <input id="months" placeholder="Months">
  <br>

  <button onclick="calc()">Calculate</button>

  <div class="result" id="result"></div>

</div>

<script>
function calc() {
  let P = Number(document.getElementById("monthly").value);
  let r = Number(document.getElementById("rate").value) / 100 / 12;
  let n = Number(document.getElementById("months").value);

  let maturity = P * n + (P * n * (n + 1) / 2) * r;

  document.getElementById("result").innerText =
    "Maturity Amount: ₹ " + maturity.toFixed(0);
}
</script>

</body>
</html>
