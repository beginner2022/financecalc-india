<!DOCTYPE html>
<html>
<head>
  <title>Compound Interest Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Compound Interest Calculator</h1>
</header>
<div class="container">
  <h2>Calculator Name</h2>
  <small>Enter values below to calculate instantly</small>
<div class="container">

  <input id="principal" placeholder="Principal Amount">
  <br>
  <input id="rate" placeholder="Interest Rate %">
  <br>
  <input id="years" placeholder="Years">
  <br>

  <button onclick="calc()">Calculate</button>

  <div class="result" id="result"></div>

</div>

<script>
function calc() {
  let P = Number(document.getElementById("principal").value);
  let r = Number(document.getElementById("rate").value) / 100;
  let n = Number(document.getElementById("years").value);

  let amount = P * Math.pow((1 + r), n);

  document.getElementById("result").innerText =
    "Future Value: ₹ " + amount.toFixed(0);
}
</script>

</body>
</html>
