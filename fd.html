<!DOCTYPE html>
<html>
<head>
  <title>FD Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Fixed Deposit Calculator</h1>
</header>

<div class="container">

  <input id="amount" placeholder="Deposit Amount">
  <br>
  <input id="rate" placeholder="Interest Rate %">
  <br>
  <input id="years" placeholder="Years">
  <br>

  <button onclick="calc()">Calculate</button>

  <div class="result" id="result"></div>

</div>

<script>
function calc() {
  let P = Number(document.getElementById("amount").value);
  let r = Number(document.getElementById("rate").value) / 100;
  let t = Number(document.getElementById("years").value);

  let maturity = P + (P * r * t);

  document.getElementById("result").innerText =
    "Maturity Amount: ₹ " + maturity.toFixed(0);
}
</script>

</body>
</html>
