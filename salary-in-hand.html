<!DOCTYPE html>
<html>
<head>
  <title>Salary In-Hand Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Salary In-Hand Calculator</h1>
</header>
  <div class="container">
  <h2>Calculator Name</h2>
  <small>Enter values below to calculate instantly</small>

<div class="container">

  <input id="ctc" placeholder="Annual CTC">
  <br>
  <input id="tax" placeholder="Tax %">
  <br>

  <button onclick="calculate()">Calculate</button>

  <div class="result" id="result"></div>

</div>

<script>
function calculate() {
  let ctc = Number(document.getElementById("ctc").value);
  let tax = Number(document.getElementById("tax").value);

  let monthly = ctc / 12;
  let taxAmount = monthly * (tax / 100);
  let inHand = monthly - taxAmount;

  document.getElementById("result").innerText =
    "Monthly In-Hand: ₹ " + inHand.toFixed(0);
}
</script>

</body>
</html>
