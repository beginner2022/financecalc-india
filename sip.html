<!DOCTYPE html>
<html>
<head>
  <title>SIP Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>SIP Calculator</h1>
</header>

<div class="container">

  <input id="monthly" placeholder="Monthly Investment">
  <br>
  <input id="rate" placeholder="Expected Return %">
  <br>
  <input id="years" placeholder="Years">
  <br>

  <button onclick="calc()">Calculate</button>

  <div class="result" id="result"></div>

</div>

<script>
function calc() {
  let P = Number(document.getElementById("monthly").value);
  let r = Number(document.getElementById("rate").value) / 100 / 12;
  let n = Number(document.getElementById("years").value) * 12;

  let fv = P * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);

  document.getElementById("result").innerText =
    "Future Value: ₹ " + fv.toFixed(0);
}
</script>

</body>
</html>
