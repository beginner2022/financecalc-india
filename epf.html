<!DOCTYPE html>
<html>
<head>
  <title>EPF Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>EPF Calculator</h1>
</header>

<div class="container">

  <input id="basic" placeholder="Basic Salary">
  <br>
  <input id="rate" placeholder="Interest % (default 8.15)">
  <br>
  <input id="years" placeholder="Years">
  <br>

  <button onclick="calc()">Calculate</button>

  <div class="result" id="result"></div>

</div>

<script>
function calc() {
  let basic = Number(document.getElementById("basic").value);
  let r = Number(document.getElementById("rate").value || 8.15) / 100;
  let years = Number(document.getElementById("years").value);

  let monthly = basic * 0.12;
  let totalContribution = monthly * 12 * years;

  let maturity = totalContribution * Math.pow(1 + r, years);

  document.getElementById("result").innerText =
    "EPF Corpus: ₹ " + maturity.toFixed(0);
}
</script>

</body>
</html>
