<!DOCTYPE html>
<html>
<head>
  <title>Loan Prepayment Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Loan Prepayment Calculator</h1>
</header>

<div class="container">

  <input id="loan" placeholder="Loan Amount">
  <br>
  <input id="rate" placeholder="Interest %">
  <br>
  <input id="years" placeholder="Remaining Years">
  <br>

  <button onclick="calc()">Calculate</button>

  <div class="result" id="result"></div>

</div>

<script>
function calc() {
  let P = Number(document.getElementById("loan").value);
  let r = Number(document.getElementById("rate").value) / 100 / 12;
  let n = Number(document.getElementById("years").value) * 12;

  let emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
  let total = emi * n;

  document.getElementById("result").innerText =
    "Total Payment Without Prepayment: ₹ " + total.toFixed(0);
}
</script>

</body>
</html>
